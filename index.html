<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SAGULIFE｜ノベルティ商談 発表者ビュー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   TOKENS & RESET
============================================================ */
:root{
  --bg:#040c1a;--panel-bg:#060e1e;--panel-border:rgba(0,212,168,.18);
  --ink:#f1f5f9;--muted:#94a3b8;--line:rgba(255,255,255,.10);
  --accent:#00D4A8;--amber:#FFB84D;--blue:#3b82f6;
  --surface:rgba(255,255,255,.055);--surface2:rgba(255,255,255,.09);
  --danger:#ff626a;--green:#39dd94;
  --font-jp:'Noto Sans JP',sans-serif;--font-serif:'Noto Serif JP',serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--font-jp);color:var(--ink)}
button{font:inherit;cursor:pointer}

/* ============================================================
   LAYOUT — presenter split view
============================================================ */
#app{display:grid;grid-template-columns:minmax(540px,62vw) minmax(380px,38vw);width:100%;height:100vh;overflow:hidden}

/* ---- left: preview pane ---- */
.preview-pane{
  position:relative;
  border-right:1px solid var(--line);
  background:#020811;
  display:flex;flex-direction:column;
  overflow:hidden;
}
.preview-notice{
  position:absolute;top:0;left:0;right:0;z-index:20;
  padding:9px 18px;
  background:rgba(4,12,26,.85);backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,.07);
  font-size:11px;letter-spacing:.12em;font-weight:700;
  color:rgba(255,255,255,.42);
  display:flex;align-items:center;justify-content:space-between;
}
.preview-notice span{color:var(--danger);font-size:10.5px}
.slide-shell{
  position:relative;
  flex:1;
  margin:38px 18px 14px;
  border:1px solid rgba(255,255,255,.12);
  border-radius:6px;
  overflow:hidden;
  box-shadow:0 24px 80px rgba(0,0,0,.6);
}

/* iframe that holds the customer view */
.slide-iframe{
  width:100%;height:100%;
  border:none;
  display:block;
  background:#040c1a;
}

/* Progress bar at bottom of preview */
.preview-progress{
  height:3px;
  background:rgba(255,255,255,.07);
  flex-shrink:0;
}
.preview-progress-fill{
  height:100%;width:3.7%;
  background:linear-gradient(90deg,var(--accent),var(--amber));
  box-shadow:0 0 18px rgba(0,212,168,.55);
  transition:width .3s ease;
}

/* ---- right: script panel ---- */
.panel{
  display:flex;flex-direction:column;
  overflow:hidden;
  background:linear-gradient(180deg,rgba(6,14,28,.98),rgba(4,9,18,.99));
}
.panel-head{
  flex-shrink:0;
  padding:18px 20px 14px;
  border-bottom:1px solid rgba(0,212,168,.15);
  position:relative;
}
.panel-head h1{font-size:20px;font-weight:900;letter-spacing:.01em;line-height:1.3}
.panel-head p{color:var(--muted);font-size:12px;margin-top:4px;line-height:1.6}
.warn-banner{
  margin:10px 0 0;padding:10px 13px;
  border:1px solid rgba(255,98,106,.38);
  background:rgba(255,98,106,.09);
  color:#ffd0d3;font-size:12px;font-weight:700;line-height:1.55;
  border-radius:6px;
}
.panel-body{flex:1;overflow-y:auto;padding:14px 18px 24px}
.panel-body::-webkit-scrollbar{width:4px}
.panel-body::-webkit-scrollbar-thumb{background:rgba(0,212,168,.25);border-radius:2px}

/* Controls grid */
.controls{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px}
.ctrl-btn{
  border:1px solid rgba(255,255,255,.12);
  background:var(--surface);
  color:var(--ink);
  padding:11px 12px;
  border-radius:5px;
  font-size:13px;font-weight:700;
  transition:background .18s,border-color .18s;
}
.ctrl-btn:hover{background:var(--surface2);border-color:rgba(255,255,255,.22)}
.ctrl-btn.primary{
  background:linear-gradient(135deg,var(--amber) 0%,#c55a0a 100%);
  border-color:rgba(255,180,77,.4);
  color:#fff;
}
.ctrl-btn.primary:hover{filter:brightness(1.1)}

/* Status block */
.status-block{
  border:1px solid var(--line);
  background:rgba(255,255,255,.04);
  border-radius:6px;
  padding:11px 13px;
  margin-bottom:12px;
  font-size:12.5px;
  line-height:1.9;
  color:var(--muted);
}
.status-block b{color:var(--amber)}
.timer{font-size:20px;color:var(--green);font-weight:900;font-variant-numeric:tabular-nums}

/* Cues list */
.cues{display:flex;flex-direction:column;gap:10px}
.cue{
  border:1px solid var(--line);
  background:rgba(255,255,255,.04);
  border-radius:8px;
  padding:14px;
  cursor:pointer;
  transition:border-color .18s,background .18s,transform .15s;
}
.cue:hover{border-color:rgba(0,212,168,.35);transform:translateX(-2px)}
.cue.active{
  border-color:rgba(0,212,168,.65);
  background:rgba(0,212,168,.09);
  box-shadow:0 0 28px rgba(0,212,168,.1);
}
.cue-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px}
.cue-no{color:var(--accent);font-weight:900;font-size:11px;letter-spacing:.12em}
.cue-title{font-weight:900;font-size:15px;line-height:1.4}
.cue-badge{
  padding:5px 10px;flex-shrink:0;
  border:1px solid rgba(0,212,168,.38);
  background:rgba(0,212,168,.10);
  color:var(--accent);
  font-size:12px;font-weight:900;
  border-radius:4px;
}
.sec{margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.06)}
.lab{font-size:11px;color:#5d6e82;letter-spacing:.12em;font-weight:900;margin-bottom:5px}
.txt{font-size:14px;line-height:1.85;color:var(--ink)}
.txt.strong{font-size:16px;font-weight:900}
.txt.script{font-size:13.5px;color:#d4e4f0;line-height:1.9}
.txt.ask{color:#a9ffd7;font-weight:800;font-size:13.5px}
.txt.avoid{color:#fde68a;font-size:13px;line-height:1.75}
.txt.goal{color:#ccfbf1;font-size:13px;line-height:1.8}

/* Keyboard shortcut hint */
.kbd-hint{
  text-align:center;padding:10px 0 0;
  font-size:11px;color:rgba(255,255,255,.3);
  letter-spacing:.06em;
}
.kbd-hint b{color:rgba(0,212,168,.6)}

/* Toast */
.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:rgba(4,14,28,.9);border:1px solid rgba(0,212,168,.3);
  color:#ccfbf1;border-radius:999px;padding:9px 16px;
  font-size:12px;z-index:999;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.toast.show{opacity:1}

/* Audience overlay controls (shown on audience page) */
.aud-overlay{
  position:fixed;right:16px;top:12px;z-index:60;
  display:flex;gap:8px;
  opacity:.12;transition:.18s;
}
.aud-overlay:hover{opacity:1}
.aud-overlay button{
  border:1px solid rgba(255,255,255,.18);
  background:rgba(0,0,0,.5);
  color:#fff;padding:7px 10px;
  font-size:12px;font-weight:700;
  border-radius:4px;
}

/* ============================================================
   SLIDE STYLES — embedded iframe will use these via srcdoc
============================================================ */
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div id="app">
  <!-- LEFT: Slide Preview -->
  <div class="preview-pane" id="previewPane">
    <div class="preview-notice">
      <span>発表者ビュー：この画面は共有しない</span>
      <span>⚠ 顧客には「顧客表示を開く」で開いた別タブのみ共有</span>
    </div>
    <div class="slide-shell">
      <iframe class="slide-iframe" id="slideFrame" title="スライドプレビュー"></iframe>
    </div>
    <div class="preview-progress"><div class="preview-progress-fill" id="progressFill"></div></div>
  </div>

  <!-- RIGHT: Script Panel -->
  <div class="panel">
    <div class="panel-head">
      <h1>SAGULIFE｜ノベルティ商談プレゼン</h1>
      <p>マーケ・販促部向け。スライドと台本が連動。左のプレビューで確認しながら進めてください。</p>
      <div class="warn-banner">⚠ この画面を共有すると台本が見えます。「顧客表示を開く」で開いた別タブだけ共有してください。</div>
    </div>
    <div class="panel-body">
      <div class="controls">
        <button class="ctrl-btn primary" id="btnOpen">顧客表示を開く</button>
        <button class="ctrl-btn" id="btnFull">全画面</button>
      </div>
      <div class="controls">
        <button class="ctrl-btn" id="btnPrev">← 前へ</button>
        <button class="ctrl-btn" id="btnNext">次へ →</button>
      </div>
      <div class="controls">
        <button class="ctrl-btn" id="btnCopyAsk">質問をコピー</button>
        <button class="ctrl-btn" id="btnCopyAll">全台本コピー</button>
      </div>
      <div class="status-block">
        <div id="audStatus">顧客表示：<b>未起動</b></div>
        <div>経過時間：<b class="timer" id="timer">00:00</b></div>
        <div>操作：<b>Space / →</b> 次へ、<b>←</b> 前へ、<b>1〜9</b> 指定</div>
      </div>
      <div class="cues" id="cues"></div>
      <div class="kbd-hint">スライド番号キー（1〜9）で直接移動　｜　<b>Space</b>/<b>→</b> 次、<b>←</b> 前</div>
    </div>
  </div>
</div>

<script>
/* ============================================================
   DATA
============================================================ */
const slides = [
  {
    num:1, headline:"本日の目的", title:"タイトル｜判断する場としての入口",
    section:"導入",
    first:"本日は売り込みではありません。御社のノベルティ・販促物の運用を1社で巻き取れるか、判断する場にできればと思っています。",
    goal:"商談の入口を『売り込み』ではなく『1社で巻き取れるかの判定』と再定義する。",
    script:"本日は売り込みではありません。アパレル、小物、ノベルティ、OEMといった案件を、企画段階から制作まで1社で巻き取れるかを判断する場にできればと思っています。複数業者で分散している調整工数を、御社側で減らせる余地があるかを見ていきます。",
    cue:"冒頭で売り込まない。『判断する場』と言い切る。",
    avoid:"いきなり実績や強みを並べない。",
    ask:"本日お時間をいただいたきっかけは、どのあたりの課題からでしょうか？"
  },
  {
    num:2, headline:"お電話の続きから", title:"Q.01｜興味理由の確認",

    goal:"相手が何に反応したのかを先に喋らせる。",
    script:"先日のお電話でご興味を持っていただいた理由は、新しい制作会社を探していたというより、複数の発注先を回す手間、もしくは特定の案件で詰まった経験があったからではないかと見ています。実際のところ、近いでしょうか。",
    cue:"回答を遮らない。ここで相手の課題語彙を拾う。",
    avoid:"いきなり会社説明に入らない。",
    ask:"近いでしょうか？"
  },
  {
    num:3, headline:"いま、調達はどう動いていますか", title:"Q.02｜現在の調達フロー",
    section:"アイスブレイク",
    first:"ノベルティや販促物の調達は、現在どんなフローで動いていますか？",
    goal:"現発注フローの形（一括／分散／代理店経由）を把握する。",
    script:"御社では、ノベルティや販促物の調達は、社内のマーケ部で一括して動かしておられますか。それとも部署ごと、案件ごとに個別の業者を使われていますか。代理店経由が多いケースもあると思います。実際の体制を教えてください。",
    cue:"形式を聞いてから次へ。否定しない。",
    avoid:"既存の代理店・業者を悪く言わない。",
    ask:"発注先は、案件ごとに変えていますか？それともまとめている先がありますか？"
  },
  {
    num:4, headline:"どこで詰まっていますか", title:"Q.03｜詰まり条件の特定",
    section:"アイスブレイク",
    first:"ロット・納期・特殊加工・企画段階のどこで詰まりやすいですか？",
    goal:"小ロット・短納期・特殊加工・企画提案のどれが刺さるか判定する。",
    script:"案件の中で詰まりやすいのは、ロット感、たとえば30枚以下の少量、納期、たとえば10営業日以下、特殊加工、たとえば刺繍×スタッズやストーン加工、もしくは企画段階の提案、このあたりではないかと思っています。御社ではどの部分が出やすいでしょうか。",
    cue:"条件を具体化して記憶を引き出す。",
    avoid:"『何か困っていますか？』のような浅い質問にしない。",
    ask:"この中で近いものはありますか？"
  },
  {
    num:5, headline:"販促物の使いどころ", title:"Q.04｜配布シーンの確認",
    section:"アイスブレイク",
    first:"ノベルティの主な配布シーンは、記念品・販促・採用・周年・展示会、どれが多いですか？",

    script:"ノベルティや販促物の主な配布シーンは、記念品、購入特典、株主優待、販促配布、採用、周年、展示会、このあたりだと思います。御社ではどれが多いでしょうか。シーンによって、アイテム選定も納期の組み立ても、提案の角度が変わります。",

    script:"直近で、見積を複数業者から取って比較する、デザインは別途依頼する、加工は別工場に発注する、納期調整が交錯する、そういう案件で時間を取られたものがあったのではないかと思っています。30枚以下、10営業日以下、特殊加工が絡む案件は、特に重くなりやすいです。",

    first:"見積・仕様・進行・検品・納品、全部つなぐのは担当者本人です。",

    script:"ノベルティや販促物の発注では、企画は社内、デザインはA社、製造はB社、印刷はC社、納品はD社、というように案件ごとに業者が変わりがちです。結果として、見積取得、仕様調整、進行管理、検品、納品、すべての連結を担当者本人がやることになります。",
    cue:"『御社が悪い』ではなく『構造が重い』で話す。",
    avoid:"価格訴求に落とさない。",

    ask:"この隠れた調整コスト、感覚的に重いと感じますか？"
  },
  {
    num:10, headline:"ワンストップ・パートナー", title:"ポジショニング｜ワンストップ・パートナー",
    section:"SAGULIFEとは",
    first:"SAGULIFEは、アパレル・グッズ制作を1社で巻き取るワンストップ・パートナーです。",
    goal:"SAGULIFE＝1社で巻き取る、と定義する。",

    ask:"御社の今の発注先の数は、何社くらいですか？"
  },
  {

  {

  },
  {

                   s.section === "業界の現実" ? '#FFB84D' : '#00D4A8';

      return `<div class="slide dark-hero${isActive ? ' active' : ''}" id="sl${i}" data-slide="${i}">
      <div class="smesh">
        <div class="blob" style="width:500px;height:500px;top:-120px;right:-100px;background:${accent};opacity:0.10"></div>
        <div class="blob" style="width:280px;height:280px;bottom:-80px;left:-50px;background:#FFB84D;opacity:0.07"></div>
      </div>
      <div class="hero-brand">株式会社SAGULIFE</div>
      <div class="hero-cover">
        <h1 class="hero-h">ブランドの世界観を、<br><span class="hero-accent">1社で。</span></h1>
      </div>
    </div>`;
    }

    return `<div class="slide ${bg}${isActive ? ' active' : ''}" id="sl${i}" data-slide="${i}">
      <div class="smesh">
        <div class="blob" style="width:500px;height:500px;top:-120px;right:-100px;background:${accent};opacity:0.10"></div>

      <div class="content${bg === 'light-q' ? ' light' : ''}">
        <div class="slide-num">${String(i+1).padStart(2,'0')} / ${String(TOTAL).padStart(2,'0')}</div>
        <h2 class="slide-h">${s.headline}</h2>

function go(n){if(n<0)n=tot-1;if(n>=tot)n=0;document.querySelector('.slide.active')&&document.querySelector('.slide.active').classList.remove('active');document.getElementById('sl'+n).classList.add('active');document.querySelectorAll('.dot').forEach(function(d,i){d.classList.toggle('a',i===n)});prog.style.width=((n+1)/tot*100)+'%';cur=n;if(window.parent&&window.parent!==window)window.parent.postMessage({type:'slide-nav',slide:n},'*')}
go(cur);
document.addEventListener('keydown',function(e){if(e.key==='ArrowRight'||e.key===' ')go(cur+1);if(e.key==='ArrowLeft')go(cur-1)});

<\/script>

/* ============================================================
   STATE & SYNC
============================================================ */
function go(n) {
  if(n < 0) n = TOTAL - 1;
  if(n >= TOTAL) n = 0;
  cur = n;
  updatePreview();
  updateCues();
  updateProgress();
  syncAudience();
  try { history.replaceState(null,'','#s'+n); } catch(e){}
}

function updatePreview() {
  const frame = document.getElementById('slideFrame');
  // Post message to iframe to switch slide
  try {
    frame.contentWindow.postMessage({ type:'goto', slide: cur }, '*');
  } catch(e) {
    // fallback: rewrite iframe
    const doc = frame.contentDocument || frame.contentWindow.document;
    doc.open(); doc.write(buildSlidePageHTML(cur)); doc.close();
  }
}

function updateCues() {
  document.querySelectorAll('.cue').forEach((el, i) => {
    el.classList.toggle('active', i === cur);
    if(i === cur) el.scrollIntoView({ block:'center', behavior:'smooth' });
  });
}

function updateProgress() {
  document.getElementById('progressFill').style.width = ((cur+1)/TOTAL*100) + '%';
}

function syncAudience() {
  if(audWin && !audWin.closed) {
    try { audWin.postMessage({ type:'goto', slide: cur }, '*'); } catch(e){}
  }
  try { localStorage.setItem('sagu_slide', cur); } catch(e) {}
}

/* ============================================================
   IFRAME INIT
============================================================ */
function initFrame() {
  const frame = document.getElementById('slideFrame');
  const html = buildSlidePageHTML(cur);
  const blob = new Blob([html], { type:'text/html' });
  const url = URL.createObjectURL(blob);
  frame.src = url;
  frame.onload = () => {
    // listen for clicks inside the iframe
    try {
      frame.contentWindow.addEventListener('keydown', e => {
        if(e.key === 'ArrowRight' || e.key === ' ') go(cur+1);
        if(e.key === 'ArrowLeft') go(cur-1);
      });
    } catch(e){}
  };
}

/* ============================================================
   CUES BUILD
============================================================ */
function buildCues() {
  const container = document.getElementById('cues');
  container.innerHTML = '';
  slides.forEach((s, i) => {
    const el = document.createElement('article');
    el.className = 'cue' + (i === cur ? ' active' : '');
    el.dataset.i = i;
    el.innerHTML = `
      <div class="cue-top">
        <div>
          <div class="cue-no">${String(i+1).padStart(2,'0')} · ${s.section}</div>
          <div class="cue-title">${s.title}</div>
        </div>
        <span class="cue-badge">${String(i+1).padStart(2,'0')}</span>
      </div>
      <div class="sec">
        <div class="lab">一言目</div>
        <div class="txt strong">${s.first}</div>
      </div>
      <div class="sec">
        <div class="lab">目的</div>
        <div class="txt goal">${s.goal}</div>
      </div>
      <div class="sec">
        <div class="lab">話す台本</div>
        <div class="txt script">${s.script}</div>
      </div>
      <div class="sec">
        <div class="lab">合図・注意</div>
        <div class="txt avoid">${s.cue}　/　⚠ ${s.avoid}</div>
      </div>
      <div class="sec">
        <div class="lab">相手に投げる質問</div>
        <div class="txt ask">${s.ask}</div>
      </div>
    `;
    el.onclick = () => go(i);
    container.appendChild(el);
  });
}

/* ============================================================
   CONTROLS
============================================================ */
document.getElementById('btnOpen').onclick = function() {
  const html = buildSlidePageHTML(cur);
  const blob = new Blob([html], { type:'text/html' });
  const url = URL.createObjectURL(blob);
  audWin = window.open(url, 'SAGU_AUDIENCE', 'noopener=false');
  if(audWin) {
    document.getElementById('audStatus').innerHTML = '顧客表示：<b>別タブで起動済み。その別タブだけ共有。</b>';
    setTimeout(() => syncAudience(), 400);
  } else {
    document.getElementById('audStatus').innerHTML = '顧客表示：<b>⚠ ポップアップがブロックされました</b>';
  }
};

document.getElementById('btnFull').onclick = function() {
  if(!document.fullscreenElement) document.documentElement.requestFullscreen?.();
  else document.exitFullscreen?.();
};

document.getElementById('btnPrev').onclick = () => go(cur - 1);
document.getElementById('btnNext').onclick = () => go(cur + 1);

document.getElementById('btnCopyAsk').onclick = async function() {
  const s = slides[cur];
  try { await navigator.clipboard.writeText(s.ask); toast('質問をコピーしました'); }
  catch(e) { alert(s.ask); }
};

document.getElementById('btnCopyAll').onclick = async function() {
  const txt = slides.map((s,i) =>
    `SLIDE ${String(i+1).padStart(2,'0')}｜${s.title}\n目的：${s.goal}\n台本：${s.script}\n合図：${s.cue}\n注意：${s.avoid}\n質問：${s.ask}`
  ).join('\n\n---\n\n');
  try { await navigator.clipboard.writeText(txt); toast('全台本をコピーしました'); }
  catch(e) { alert('コピーできませんでした'); }
};

/* ============================================================
   KEYBOARD
============================================================ */
document.addEventListener('keydown', e => {
  const tag = e.target?.tagName;
  if(tag === 'INPUT' || tag === 'TEXTAREA') return;
  if(e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(cur+1); }
  if(e.key === 'ArrowLeft') { e.preventDefault(); go(cur-1); }
  if(/^[1-9]$/.test(e.key)) go(parseInt(e.key,10)-1);
  if(e.key === '0') go(9);
});

/* Listen for messages from iframe */
window.addEventListener('message', e => {
  if(!e.data) return;
  if(e.data.type === 'slide-nav') { cur = e.data.slide; updateCues(); updateProgress(); syncAudience(); }
  if(e.data.type === 'slide-click') { cur = e.data.slide; updateCues(); updateProgress(); syncAudience(); }
});

/* ============================================================
   TIMER
============================================================ */
function pad(n){ return String(n).padStart(2,'0'); }
setInterval(() => {
  const sec = Math.floor((Date.now() - startedAt) / 1000);
  document.getElementById('timer').textContent = pad(Math.floor(sec/60)) + ':' + pad(sec % 60);
}, 500);

/* ============================================================
   TOAST
============================================================ */
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(window._toastT);
  window._toastT = setTimeout(() => el.classList.remove('show'), 1400);
}

/* ============================================================
   HASH INIT
============================================================ */
(function init() {
  const m = String(location.hash || '').match(/^#s(\d+)$/i);
  if(m) cur = Math.min(Math.max(0, parseInt(m[1],10)), TOTAL-1);
  buildCues();
  initFrame();
  updateProgress();
})();
</script>
</body>
</html>
