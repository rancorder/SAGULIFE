ker{font-size:clamp(14px,1.3vw,22px);color:var(--orange2);font-weight:900;letter-spacing:.16em;margin-bottom:3vh}.fallbackTitle{font-size:clamp(38px,4.8vw,82px);font-weight:950;line-height:1.18;letter-spacing:.01em;text-wrap:balance}.fallbackSub{margin-top:3vh;font-size:clamp(18px,1.7vw,30px);line-height:1.7;color:rgba(255,255,255,.78);max-width:74vw}.fallbackTags{display:flex;gap:14px;flex-wrap:wrap;margin-top:5vh}.fallbackTag{border:1px solid rgba(255,122,26,.42);color:#fff;padding:12px 20px;border-radius:999px;background:rgba(255,122,26,.10);font-weight:900;font-size:clamp(14px,1.2vw,20px)}.shade{position:absolute;inset:0;pointer-events:none;background:linear-gradient(90deg,rgba(0,0,0,.18),transparent 16%,transparent 84%,rgba(0,0,0,.18))}.hud{position:absolute;left:58px;top:48px;z-index:7;display:flex;align-items:center;gap:12px;color:rgba(255,255,255,.58);font-size:12px;letter-spacing:.1em;font-weight:900;text-shadow:0 1px 8px #000}.logo{height:38px;min-width:132px;display:grid;place-items:center;color:#fff;letter-spacing:.22em;border:1px solid rgba(255,122,26,.5);background:linear-gradient(135deg,rgba(255,122,26,.25),rgba(255,122,26,.06));box-shadow:0 0 26px rgba(255,122,26,.22)}.counter{position:absolute;right:58px;bottom:48px;z-index:7;color:rgba(255,255,255,.58);font-size:13px;letter-spacing:.14em;font-weight:900}.vflag{position:absolute;right:58px;top:52px;z-index:7;color:var(--orange2);font-size:12px;font-weight:900;letter-spacing:.14em;display:none}.vflag.on{display:block}.vctrl{position:absolute;left:58px;bottom:48px;z-index:8;display:flex;gap:8px;opacity:.16;transition:.18s}.vctrl:hover{opacity:1}.vctrl button,.audOverlay button{border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.42);color:#fff;padding:8px 10px;cursor:pointer;font-size:12px;font-weight:900}.presenter{display:grid;grid-template-columns:minmax(520px,60vw) minmax(400px,40vw);width:100%;height:100%}.previewPane{position:relative;padding:58px 26px 26px;border-right:1px solid var(--line);background:rgba(0,0,0,.18)}.previewShell{position:relative;width:100%;height:100%;border:1px solid rgba(255,255,255,.14);box-shadow:0 24px 80px rgba(0,0,0,.48);overflow:hidden}.notice{position:absolute;top:18px;left:26px;color:rgba(255,255,255,.54);font-size:12px;letter-spacing:.14em;font-weight:900}.previewShell .hud{left:26px;top:24px;font-size:10px}.previewShell .logo{height:30px;min-width:100px}.previewShell .counter{right:26px;bottom:22px}.previewShell .vflag{right:26px;top:28px}.previewShell .stage:after{inset:20px}.previewShell .vctrl{display:none}.panel{overflow:auto;padding:22px;background:linear-gradient(180deg,rgba(9,18,31,.97),rgba(4,7,12,.98))}.head{position:sticky;top:0;z-index:3;background:linear-gradient(180deg,rgba(9,18,31,1),rgba(9,18,31,.93));padding:8px 0 14px}.head h1{font-size:24px}.head p,.status{color:var(--muted);font-size:13px;line-height:1.6;margin-top:6px}.warn{border:1px solid rgba(255,98,106,.45);background:rgba(255,98,106,.10);color:#ffd0d3;padding:12px 14px;font-weight:900;line-height:1.55;margin:8px 0 14px}.controls{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}.controls button{border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.055);color:#fff;padding:12px 14px;cursor:pointer;font-weight:900}.controls .primary{background:linear-gradient(135deg,var(--orange),#b6420d);border-color:rgba(255,122,26,.55)}.status{border:1px solid var(--line);background:rgba(255,255,255,.045);padding:12px 14px;margin-bottom:14px}.status b{color:var(--orange2)}.timer{font-size:20px;color:var(--green);font-weight:900}.cues{display:flex;flex-direction:column;gap:12px}.cue{border:1px solid var(--line);background:rgba(255,255,255,.045);padding:16px;cursor:pointer;transition:.18s}.cue:hover{border-color:rgba(255,122,26,.35);transform:translateX(-2px)}.cue.active{border-color:rgba(255,122,26,.72);background:rgba(255,122,26,.12);box-shadow:0 0 28px rgba(255,122,26,.12)}.cueTop{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:10px}.cueNo{color:var(--orange2);font-weight:900;letter-spacing:.12em}.cueTitle{font-weight:900;font-size:17px}.badge{padding:7px 12px;border:1px solid rgba(255,122,26,.42);background:rgba(255,122,26,.12);color:var(--orange2);font-size:13px;font-weight:900}.mediaType{color:var(--blue);font-size:12px;font-weight:900;letter-spacing:.1em}.sec{margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.07)}.lab{font-size:12px;color:#5d6e82;letter-spacing:.12em;font-weight:900;margin-bottom:6px}.txt{font-size:15px;line-height:1.8}.strong{font-size:18px;font-weight:900}.ask{color:#a9ffd7;font-weight:800}.tiny{color:var(--muted);font-size:13px;line-height:1.7}.audOverlay{position:fixed;right:18px;top:14px;z-index:60;display:flex;gap:8px;opacity:.13;transition:.18s}.audOverlay:hover{opacity:1}@media(max-width:980px){.presenter{grid-template-columns:1fr}.previewPane{display:none}.panel{height:100vh}.hud{left:24px;top:24px}.counter{right:24px;bottom:24px}.stage:after{inset:18px}.vflag{right:24px;top:28px}.vctrl{left:24px;bottom:24px}}
</style></head><body><div id="app"></div><script>
const slides=[{"base": "slide00", "no": "00", "title": "SAGULIFE", "headline": "SAGULIFE", "sub": "ノベルティ・グッズ制作会社様向け 補完ライン提案", "first": "本日は、SAGULIFEの一方的な紹介ではなく、御社が過去に対応を見送った案件の中に、補完できる余地があるかを確認できればと思います。", "talk": "最初に強く売り込まず、商談の前提を「過去案件の棚卸し」に置きます。置き換えではなく、補完の話として入ります。", "point": "表紙は短く。SAGULIFEを大きく見せ、次の対応範囲へつなぎます。", "ask": "まずは、過去に受けたかったけれど受けにくかった案件があるか、そこから確認させてください。", "tags": ["商談資料", "補完ライン", "受け皿確認"]}, {"base": "slide01", "no": "範囲", "title": "SAGULIFEの対応範囲", "headline": "SAGULIFEの対応範囲", "sub": "アパレル・雑貨・特殊加工・小ロット・POPUP/物販まで", "first": "まず、SAGULIFE側で対応できる範囲を共有します。アパレル、雑貨、小ロット、POPUPや物販向け、そして他社で難しい特殊加工も相談可能です。", "talk": "ここは自慢ではなく、相手が過去に断った案件を思い出すための参照表です。Tシャツ、スウェット、トートバッグ、ステッカー、アクリルスタンド、ラバーキーホルダー、特殊加工、POPUP/物販までを見せます。", "point": "対応範囲を広げて見せる。後続の「過去に断った案件」と接続します。", "ask": "この中で、御社が普段はあまり受けていない、または外部補完があると助かる領域はありますか？", "tags": ["Tシャツ", "スウェット", "トートバッグ", "ステッカー", "アクスタ", "ラバーキーホルダー", "特殊加工", "POPUP/物販"]}, {"base": "slide02", "no": "特殊", "title": "特殊加工", "headline": "他社にできない特殊加工が、提案の幅を広げます", "sub": "一般的な名入れでは対応しにくい仕様も相談可能。例：ジップまたぎプリント対応。", "first": "対応範囲の中でも、特に差別化しやすいのが特殊加工です。通常仕様では弱い案件に、もう一段提案できる受け皿として使える可能性があります。", "talk": "「何でもできます」ではなく、通常の名入れや定番ノベルティでは表現しづらい案件に対して、特殊加工という追加提案の余地があることを示します。", "point": "ここで「他社にできない特殊加工」の事実を入れる。商談相手が過去の加工NG案件を思い出す導線にします。", "ask": "過去に、加工仕様が理由で受けにくかった相談はありましたか？", "tags": ["特殊加工", "ジップまたぎプリント", "差別化", "小ロット相談OK"]}, {"base": "slide03", "no": "01", "title": "01 過去に断った案件、まだ売上に変えられるかもしれません", "headline": "過去に断った案件、まだ売上に変えられるかもしれません", "sub": "新しい売り込みではなく、過去案件の振り返りから始める。", "first": "ここからは、御社が過去に対応を見送った問い合わせの中に、次回は売上化できる案件が残っていないかを見ていきたいです。", "talk": "新規開拓の話ではなく、すでに来ていた相談の再確認にします。相手に「そういえば断った案件があった」と思い出してもらうのが狙いです。", "point": "相手の記憶を刺激する。説明を増やさず問いを置きます。", "ask": "過去半年から1年で、条件が合わず対応を見送った問い合わせはありましたか？", "tags": ["過去案件", "未対応相談", "売上化余地"]}, {"base": "slide04", "no": "02", "title": "02 売上拡大は、新規開拓だけではありません", "headline": "売上拡大は、新規開拓だけではありません", "sub": "すでに来ていた相談の中に、次の受注候補が眠っているかもしれません。", "first": "売上を伸ばす方法は、新しい問い合わせを増やすことだけではありません。すでに来ていたけれど、当時は対応できなかった相談の中にも余地があります。", "talk": "営業量を増やす話にすると重くなるので、「過去の未対応案件の再検討」にします。相手の負担を増やさず売上余地を探す姿勢を出します。", "point": "新規開拓ではなく、既存問い合わせの棚卸しとして見せます。", "ask": "御社では、問い合わせは来たものの、当時の条件で見送った案件はどのくらいありますか？", "tags": ["既存問い合わせ", "未対応案件", "次回受注候補"]}, {"base": "slide05", "no": "03", "title": "03 断った理由から、強化したい部分が見えてくる", "headline": "断った理由から、強化したい部分が見えてくる", "sub": "過去の見送り理由を整理すると、次に強化すべき領域が見えてきます。", "first": "断った理由を振り返ると、御社が今後強化したい部分が見えてきます。ロット、納期、加工、商材、キャパのどこに集中していたかを確認したいです。", "talk": "「断った理由は需要がなかったからか」ではなく、「強化したい部分はどこか」に変えます。相手が前向きに話しやすくなります。", "point": "責める言い方を避け、強化領域の確認に変えます。", "ask": "過去に見送った理由で多かったのは、ロット・納期・加工・商材・キャパのどれに近いですか？", "tags": ["ロット", "納期", "加工", "商材", "キャパ"]}, {"base": "slide06", "no": "04", "title": "04 SAGULIFEの対応力で、受け皿を広げられるかもしれません", "headline": "SAGULIFEの対応力で、受け皿を広げられるかもしれません", "sub": "小ロット・特殊加工・アパレル/雑貨・POPUP/物販対応を補完ラインとして活用できる可能性があります。", "first": "もし見送り理由が、御社の需要不足ではなく受け皿の制約だった場合、SAGULIFEの対応力で受け皿を広げられるかもしれません。", "talk": "ここでSAGULIFEを解決策として置きます。ただし「任せてください」ではなく、「活用できる可能性がある」と控えめにします。", "point": "SAGULIFEを主役にしすぎず、受け皿拡大の補完役として出します。", "ask": "御社の既存ラインを活かしたまま、補完ラインがあると受けやすくなる案件はありますか？", "tags": ["補完ライン", "受け皿拡大", "対応力"]}, {"base": "slide07", "no": "05", "title": "05 見送りやすい案件には、共通点があります", "headline": "見送りやすい案件には、共通点があります", "sub": "小ロット・短納期・変則仕様。判断が難しい案件ほど、次の提案機会になりやすい。", "first": "見送りやすい案件には共通点があります。小ロット、短納期、変則仕様のように、受注判断が難しくなりやすい案件です。", "talk": "ここは細かい説明ではなく、相手の「あるある」を引き出します。あえて3つに絞り、商談相手が思い出しやすい余白を残します。", "point": "情報を詰め込まない。小ロット・短納期・変則仕様だけでよいです。", "ask": "この3つの中で、御社が一番判断に迷いやすいのはどれですか？", "tags": ["小ロット", "短納期", "変則仕様"]}, {"base": "slide08", "no": "06", "title": "06 小ロットは面倒。でも、次の取引の入口にもなる", "headline": "小ロットは面倒。でも、次の取引の入口にもなる", "sub": "初回接点・テスト発注・限定案件から継続取引へ。", "first": "小ロットは面倒な案件に見えやすい一方で、初回取引や継続発注の入口になることもあります。", "talk": "小ロットを美化しすぎず、「面倒」を認めたうえで可能性に変えます。相手が本音で話しやすくなります。", "point": "小ロットの負荷と可能性を両面で扱います。", "ask": "御社では、小ロットから継続案件に育ったケースはありますか？", "tags": ["初回接点", "テスト発注", "限定案件", "継続取引"]}, {"base": "slide09", "no": "07", "title": "07 技術的に難しかった案件も、補完先があれば提案範囲になる", "headline": "技術的に難しかった案件も、補完先があれば提案範囲になる", "sub": "アパレル・雑貨・特殊加工・POPUP向けまで、補完先があることで提案可能領域が広がる。", "first": "自社単独では難しかった案件も、外部の補完先があれば次回から提案範囲に変えられる可能性があります。", "talk": "技術的に「できなかった」と指摘しません。あくまで補完先があれば提案範囲が広がる、という前向きな表現にします。", "point": "技術不足ではなく、提案範囲拡大の話にします。", "ask": "御社で、対応できれば提案の幅が広がると感じる商材や加工はありますか？", "tags": ["アパレル", "雑貨", "特殊加工", "POPUP向け"]}, {"base": "slide10", "no": "08", "title": "08 キャパ不足で断った案件は、次回の受注候補に変えられる", "headline": "キャパ不足で断った案件は、次回の受注候補に変えられる", "sub": "繁忙期・人員不足・製造枠不足で見送った案件を、次の受注候補として見直す。", "first": "キャパ不足で断った案件は、需要がなかったのではなく、当時受けられる体制がなかっただけかもしれません。次回の受注候補として見直せます。", "talk": "繁忙期や人員不足は相手が認めやすいテーマ。ここで外部補完の必要性を自然に想起させます。", "point": "「断った案件」を「次回候補」に言い換えます。", "ask": "繁忙期や製造枠不足で、本当は受けたかった相談を見送ることはありますか？", "tags": ["繁忙期", "人員不足", "製造枠不足", "次回受注候補"]}, {"base": "slide11", "no": "09", "title": "09 確認したいのは、SAGULIFEが売れるかではありません", "headline": "確認したいのは、SAGULIFEが売れるかではありません", "sub": "御社の「受けたいが受けにくい案件」があるかを確認したい。", "first": "ここで確認したいのは、SAGULIFEが売れるかではありません。御社の中に、受けたいが受けにくい案件があるかです。", "talk": "営業感を消す重要スライドです。売り込みではなく、過去の見送り案件の中に補完余地があるかを一緒に確認する姿勢を明確にします。", "point": "主語をSAGULIFEから相手企業へ戻します。", "ask": "もし外部で安全に補完できるなら、次回は受けたい案件はありますか？", "tags": ["見極め", "受けたい案件", "補完余地"]}, {"base": "slide12", "no": "10", "title": "10 御社の裏側で、受け皿になれる余地を確認したい", "headline": "御社の裏側で、受け皿になれる余地を確認したい", "sub": "既存体制を置き換えるのではなく、取り切れていない案件の補完ラインとして使えるかを見極める。", "first": "最後に、SAGULIFEは御社の既存体制を置き換えるのではなく、取り切れていない案件を補完する裏側の制作ラインとして使えるかを確認したいです。", "talk": "小ロット、変則仕様、アパレル/雑貨、短納期、キャパ不足で見送っていた領域に、SAGULIFEが入れる余地があるかを確認して終えます。", "point": "置き換えではなく補完。売り込みではなく見極め。", "ask": "次回確認するとしたら、過去に見送った案件の中から1件だけ具体的に見てもよろしいですか？", "tags": ["裏側の制作ライン", "補完", "次回確認"]}];
slides.forEach(s=>{s.image=`assets/${s.base}.png`;s.video=`assets/${s.base}.mp4`;s.hasVideo=false;s.checked=false;s.imageOk=false});
const params=new URLSearchParams(location.search),isAud=params.get("view")==="audience";let cur=parseInt(location.hash.replace("#s",""),10);if(isNaN(cur)||cur<0||cur>=slides.length)cur=0;let aud=null,start=Date.now();const ch=("BroadcastChannel"in window)?new BroadcastChannel("sagulife-sync-v3"):null;
function tagsHtml(s){return(s.tags||[]).map(t=>`<span class="fallbackTag">${t}</span>`).join("")}
function media(s,i){let a=i===cur?" active":"";return`<div class="media use-image${a}" data-i="${i}"><img data-img="${i}" src="${s.image}" alt="${s.title}"><video data-v="${i}" src="${s.video}" poster="${s.image}" muted playsinline preload="metadata" loop></video><div class="fallback"><div class="fallbackInner"><div class="fallbackKicker">SAGULIFE PRESENTATION</div><div class="fallbackTitle">${s.headline}</div><div class="fallbackSub">${s.sub}</div><div class="fallbackTags">${tagsHtml(s)}</div></div></div><div class="shade"></div></div>`}
function stage(){return`<div class="stage"><div class="progressTrack"><div class="progress"></div></div>${slides.map(media).join("")}<div class="hud"><div class="logo">SAGULIFE</div><div>CLIENT PRESENTATION<br>WITH PRESENTER NOTES</div></div><div class="vflag">VIDEO / AUTO DETECTED</div><div class="counter">01 / ${String(slides.length).padStart(2,"0")}</div><div class="vctrl"><button onclick="restartVideo()">動画を最初から</button><button onclick="toggleVideo()">停止/再生</button></div></div>`}
function initMediaDetection(){document.querySelectorAll("img[data-img]").forEach(img=>{const i=parseInt(img.dataset.img,10),s=slides[i];img.addEventListener("load",()=>{s.imageOk=true;updateMediaClasses();updateCueMediaLabels()},{once:true});img.addEventListener("error",()=>{s.imageOk=false;updateMediaClasses();updateCueMediaLabels()},{once:true})});document.querySelectorAll("video[data-v]").forEach(v=>{const i=parseInt(v.dataset.v,10),s=slides[i];v.addEventListener("loadedmetadata",()=>{s.hasVideo=true;s.checked=true;updateMediaClasses();if(i===cur)playCurrentVideo();updateCueMediaLabels()},{once:true});v.addEventListener("error",()=>{s.hasVideo=false;s.checked=true;updateMediaClasses();updateCueMediaLabels()},{once:true});try{v.load()}catch(e){}})}
function updateMediaClasses(){document.querySelectorAll(".media").forEach((m,i)=>{const active=i===cur,useVideo=active&&slides[i].hasVideo,useImage=active&&!useVideo&&slides[i].imageOk,useFallback=active&&!useVideo&&!slides[i].imageOk;m.classList.toggle("active",active);m.classList.toggle("use-video",useVideo);m.classList.toggle("use-image",useImage);m.classList.toggle("use-fallback",useFallback)});document.querySelectorAll(".vflag").forEach(f=>f.classList.toggle("on",slides[cur]&&slides[cur].hasVideo))}
function setSlide(n,src="local"){if(n<0||n>=slides.length)return;cur=n;updateMediaClasses();document.querySelectorAll(".progress").forEach(p=>p.style.width=((cur+1)/slides.length*100)+"%");document.querySelectorAll(".counter").forEach(c=>c.textContent=String(cur+1).padStart(2,"0")+" / "+String(slides.length).padStart(2,"0"));document.querySelectorAll(".cue").forEach((c,i)=>c.classList.toggle("active",i===cur));resetVideos();let ac=document.querySelector(".cue.active");if(ac&&src==="local")ac.scrollIntoView({block:"center",behavior:"smooth"});history.replaceState(null,"","#s"+cur);if(!isAud&&src!=="remote")sync()}
function resetVideos(){document.querySelectorAll("video").forEach(v=>{let i=parseInt(v.dataset.v,10);try{if(i===cur&&slides[i].hasVideo){v.pause();v.currentTime=0;let p=v.play();if(p&&p.catch)p.catch(()=>{})}else{v.pause();v.currentTime=0}}catch(e){}})}function playCurrentVideo(){document.querySelectorAll(`video[data-v="${cur}"]`).forEach(v=>{try{let p=v.play();if(p&&p.catch)p.catch(()=>{})}catch(e){}})}function restartVideo(){document.querySelectorAll(`video[data-v="${cur}"]`).forEach(v=>{try{v.pause();v.currentTime=0;v.play()}catch(e){}})}function toggleVideo(){document.querySelectorAll(`video[data-v="${cur}"]`).forEach(v=>{v.paused?v.play():v.pause()})}
function sync(){let m={type:"sagulife-slide",slide:cur,at:Date.now()};if(aud&&!aud.closed)aud.postMessage(m,"*");if(ch)ch.postMessage(m);try{localStorage.setItem("sagulife-sync-v3",JSON.stringify(m))}catch(e){}}function openAud(){let u=new URL(location.href);u.searchParams.set("view","audience");u.hash="s"+cur;aud=window.open(u.toString(),"SAGULIFE_AUDIENCE","popup=yes,width=1440,height=900");setTimeout(sync,300);let st=document.getElementById("audStatus");if(st)st.innerHTML=aud?"顧客表示：<b>別ウィンドウ起動済み。この別ウィンドウだけ共有。</b>":"顧客表示：<b>ポップアップがブロックされています。</b>"}function fs(){if(!document.fullscreenElement&&document.documentElement.requestFullscreen)document.documentElement.requestFullscreen();else if(document.exitFullscreen)document.exitFullscreen()}function mediaStatusText(i){if(slides[i].hasVideo)return"VIDEO DETECTED / MP4自動再生";if(slides[i].imageOk)return"IMAGE SLIDE / PNG表示";return"FALLBACK SLIDE / assets未検出"}function updateCueMediaLabels(){document.querySelectorAll(".mediaType").forEach((el,i)=>el.textContent=mediaStatusText(i))}
function presenter(){document.getElementById("app").innerHTML=`<div class="presenter"><div class="previewPane"><div class="notice">発表者ビュー：この画面は共有しない</div><div class="previewShell">${stage()}</div></div><aside class="panel"><div class="head"><h1>SAGULIFE 台本操作型プレゼン</h1><p>GitHub→Vercel対応。assets/slideXX.png があれば表示。MP4があれば自動で動画再生。</p></div><div class="warn">⚠ この画面を共有すると台本が見えます。「顧客表示を開く」で開いた別ウィンドウだけ共有してください。</div><div class="controls"><button class="primary" id="open">顧客表示を開く</button><button id="full">全画面</button></div><div class="controls"><button id="prev">← 前へ</button><button id="next">次へ →</button></div><div class="controls"><button id="rv">動画を最初から</button><button id="copy">質問をコピー</button></div><div class="status"><div id="audStatus">顧客表示：<b>未起動</b></div><div>経過時間：<b class="timer" id="timer">00:00</b></div><div>操作：Space / → 次へ、← 前へ、1〜9 指定、R 動画再開</div><div>画像配置：<b>assets/slide00.png〜assets/slide12.png</b></div></div><div class="cues">${slides.map((s,i)=>`<article class="cue" data-i="${i}"><div class="cueTop"><div><div class="cueNo">${String(i+1).padStart(2,"0")} / ${s.base}</div><div class="cueTitle">${s.title}</div></div><span class="badge">${s.no}</span></div><div class="mediaType">${mediaStatusText(i)}</div><div class="sec"><div class="lab">一言目</div><div class="txt strong">${s.first}</div></div><div class="sec"><div class="lab">補足説明</div><div class="txt">${s.talk}</div></div><div class="sec"><div class="lab">押さえるポイント</div><div class="tiny">${s.point}</div></div><div class="sec"><div class="lab">相手に投げる質問</div><div class="txt ask">${s.ask}</div></div></article>`).join("")}</div></aside></div>`;document.querySelectorAll(".cue").forEach(c=>c.onclick=()=>setSlide(parseInt(c.dataset.i,10)));document.getElementById("open").onclick=openAud;document.getElementById("full").onclick=fs;document.getElementById("prev").onclick=()=>setSlide(cur-1);document.getElementById("next").onclick=()=>setSlide(cur+1);document.getElementById("rv").onclick=restartVideo;document.getElementById("copy").onclick=async()=>{try{await navigator.clipboard.writeText(slides[cur].ask)}catch(e){alert(slides[cur].ask)}};setInterval(()=>{let sec=Math.floor((Date.now()-start)/1000),m=String(Math.floor(sec/60)).padStart(2,"0"),s=String(sec%60).padStart(2,"0"),t=document.getElementById("timer");if(t)t.textContent=`${m}:${s}`},500);initMediaDetection();setSlide(cur,"remote")}
function audience(){document.getElementById("app").innerHTML=stage();let o=document.createElement("div");o.className="audOverlay";o.innerHTML='<button onclick="fs()">全画面</button><button onclick="restartVideo()">動画再開</button>';document.body.appendChild(o);window.onmessage=e=>{if(e.data&&e.data.type==="sagulife-slide")setSlide(e.data.slide,"remote")};if(ch)ch.onmessage=e=>{if(e.data&&e.data.type==="sagulife-slide")setSlide(e.data.slide,"remote")};window.addEventListener("storage",e=>{if(e.key==="sagulife-sync-v3"&&e.newValue){try{let m=JSON.parse(e.newValue);if(m.type==="sagulife-slide")setSlide(m.slide,"remote")}catch(_){}}});initMediaDetection();setSlide(cur,"remote")}
document.addEventListener("keydown",e=>{if(e.key==="ArrowRight"||e.key===" "||e.key==="PageDown"){e.preventDefault();setSlide(cur+1)}if(e.key==="ArrowLeft"||e.key==="PageUp"){e.preventDefault();setSlide(cur-1)}if(/^[1-9]$/.test(e.key))setSlide(parseInt(e.key,10)-1);if(e.key.toLowerCase()==="r")restartVideo();if(e.key.toLowerCase()==="f"&&isAud)fs()});isAud?audience():presenter();
</script></body></html>
